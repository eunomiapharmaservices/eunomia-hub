<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eunomia Marketing Hub</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:#F4F7F4;color:#1C2B1D;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes up{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .card{background:#fff;border:1px solid #E2E8E2;border-radius:14px;padding:20px;animation:up 0.2s ease;}
  .tab{background:none;border:none;padding:10px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#6B7280;transition:all .15s;}
  .tab.on{color:#3d8b40;border-bottom-color:#3d8b40;}
  .tab:hover:not(.on){color:#111827;}
  .tc{border:1.5px solid #E5E7EB;border-radius:10px;padding:14px;cursor:pointer;background:#fff;transition:all .15s;}
  .tc.sel{border-color:#3d8b40;background:#EBF5EC;}
  .tc:hover:not(.sel){border-color:#3d8b4080;}
  .row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E5E7EB;font-size:13px;}
  .row:last-child{border-bottom:none;}
  .cu{background:#3d8b40;color:#fff;border-radius:12px 12px 2px 12px;padding:10px 14px;font-size:13px;max-width:80%;margin-left:auto;}
  .ca{background:#F3F4F6;color:#111827;border-radius:12px 12px 12px 2px;padding:10px 14px;font-size:13px;max-width:85%;white-space:pre-wrap;line-height:1.6;}
  input,button,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:4px;height:4px;}
  ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// ── colours ──────────────────────────────────────────────────────────────────
const C={
  navy:'#2C3E2D',       // deep forest green (topbar, headers)
  blue:'#3d8b40',       // primary green (replaces blue throughout)
  blueL:'#EBF5EC',      // light green tint
  teal:'#0E9E8E',       // teal (keep for secondary accents)
  amber:'#E8651A',      // Eunomia orange (logo accent, warnings)
  amberL:'#FEF0E8',     // light orange tint
  red:'#DC2626',redL:'#FEE2E2',
  green:'#3d8b40',      // success green
  greenL:'#EBF5EC',
  gray:'#6B7280',grayL:'#F5F6F5',border:'#E2E8E2',
  text:'#1C2B1D',muted:'#5C6B5D',white:'#FFFFFF'
};

// ── tiny components ───────────────────────────────────────────────────────────
function Spin({s=16}){
  return <span style={{display:'inline-block',width:s,height:s,border:`2px solid #3d8b4030`,borderTopColor:'#3d8b40',borderRadius:'50%',animation:'spin .7s linear infinite'}}/>;
}
function Pill({label,color}){
  return <span style={{fontSize:11,fontWeight:600,background:color+'18',color,borderRadius:20,padding:'2px 9px',whiteSpace:'nowrap'}}>{label}</span>;
}
function Stat({label,value,sub,color=C.blue}){
  return(
    <div style={{background:'#fff',border:`1px solid ${C.border}`,borderRadius:12,padding:'16px 18px'}}>
      <div style={{fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>{label}</div>
      <div style={{fontSize:26,fontWeight:700,color:C.text,lineHeight:1.1}}>{value??'—'}</div>
      {sub&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{sub}</div>}
    </div>
  );
}
function Alert({type='info',children}){
  const m={info:[C.blueL,C.blue],warning:[C.amberL,C.amber],error:[C.redL,C.red],success:[C.greenL,C.green]};
  const[bg,fg]=m[type];
  return <div style={{background:bg,border:`1px solid ${fg}30`,borderRadius:10,padding:'10px 14px',fontSize:13,marginBottom:10}}>{children}</div>;
}
function H({children}){
  return <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>{children}</div>;
}

// ── date helpers ──────────────────────────────────────────────────────────────
const daysSince=iso=>Math.floor((Date.now()-new Date(iso))/86400000);
const nextDue=iso=>{const d=new Date(iso);d.setDate(d.getDate()+30);return d;};
const daysUntil=iso=>Math.max(0,Math.ceil((nextDue(iso)-Date.now())/86400000));
const fmt=iso=>new Date(iso).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

const tagColor={PMCPA:C.blue,ABPI:C.navy,ANSM:C.teal,FCPA:C.amber,Digital:C.green,Training:'#7C3AED',Strategy:C.red};

// ── stream Claude via /api/claude ─────────────────────────────────────────────
async function streamClaude({messages,system,onChunk}){
  let resp;
  try{
    resp=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages,system})
    });
  }catch(e){
    throw new Error('Could not reach /api/claude. Check your Vercel deployment.');
  }
  if(!resp.ok){
    let msg='AI error ('+resp.status+')';
    try{const e=await resp.json();msg=e.error||msg;}catch{}
    if(resp.status===500&&msg.includes('ANTHROPIC_API_KEY')){
      throw new Error('ANTHROPIC_API_KEY not set. Go to Vercel → Settings → Environment Variables and add your key, then Redeploy.');
    }
    throw new Error(msg);
  }
  const reader=resp.body.getReader();
  const dec=new TextDecoder();
  let full='';
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    for(const line of dec.decode(value,{stream:true}).split('\n')){
      if(line.startsWith('data: ')){
        try{
          const j=JSON.parse(line.slice(6));
          if(j.type==='content_block_delta'&&j.delta?.text){full+=j.delta.text;onChunk(full);}
          if(j.type==='error'){throw new Error(j.error?.message||'Stream error');}
        }catch(e){if(e.message&&e.message!=='Unexpected end of JSON input'){}};
      }
    }
  }
  if(!full)throw new Error('No response received. Check ANTHROPIC_API_KEY has credits at console.anthropic.com');
  return full;
}

// ── API helpers ───────────────────────────────────────────────────────────────
const apig=async path=>{try{const r=await fetch(path);return await r.json();}catch(e){return{error:e.message};}};
const apip=async(path,body)=>{try{const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json();}catch(e){return{error:e.message};}};

// ── fallback mock data (shown when API keys not yet configured) ───────────────
const MOCK={
  mc:{subscribers:834,openRate:'31.4',lastSent:new Date(Date.now()-25*86400000).toISOString(),lastSubject:'PMCPA Social Media Guidance: What It Means For Your Team',
    campaigns:[
      {name:'PMCPA Social Media Guidance Alert',date:'08/04/2025',sent:834,opens:'34.2%',clicks:'5.1%'},
      {name:'March Regulatory Roundup',date:'18/03/2025',sent:801,opens:'29.7%',clicks:'3.9%'},
      {name:'ABPI Code 2024 — Key Changes',date:'28/02/2025',sent:788,opens:'38.1%',clicks:'6.2%'},
    ]},
  ht:{creditsUsed:312,creditsTotal:500,verificationUsed:289,verificationTotal:500,plan:'Starter'},
  li:{name:'Eunomia Consulting',connections:1247},
  sr:{summary:{activeSequences:3,messagesSent:47,replies:9,replyRate:'19.1',meetings:2},
    campaigns:[
      {name:'PMCPA Social Media Update',sent:18,replies:4,rate:'22.2',status:'active'},
      {name:'ABPI Code 2024 Briefing',sent:21,replies:3,rate:'14.3',status:'active'},
      {name:'Compliance Audit Offer',sent:8,replies:2,rate:'25.0',status:'active'},
    ]}
};

// ─────────────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState('overview');
  const[mc,setMc]=useState(null);
  const[ht,setHt]=useState(null);
  const[li,setLi]=useState(null);
  const[sr,setSr]=useState(null);
  const[loading,setLoading]=useState({mc:true,ht:true,li:true,sr:true});
  const[errors,setErrors]=useState({});
  const[usingMock,setUsingMock]=useState({});

  // newsletter
  const[composerOpen,setComposerOpen]=useState(false);
  const[step,setStep]=useState('topics');
  const[topics,setTopics]=useState([]);
  const[topicLoading,setTopicLoading]=useState(false);
  const[selTopics,setSelTopics]=useState([]);
  const[draft,setDraft]=useState('');
  const[draftSubj,setDraftSubj]=useState('');
  const[draftLoading,setDraftLoading]=useState(false);
  const[sending,setSending]=useState(false);
  const[mcResult,setMcResult]=useState(null);

  // chat
  const[chatMsg,setChatMsg]=useState('');
  const[chatHist,setChatHist]=useState([]);
  const[chatLoading,setChatLoading]=useState(false);
  const chatEnd=useRef(null);

  useEffect(()=>{loadAll();},[]);
  useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'});},[chatHist]);

  async function loadAll(){
    setLoading({mc:true,ht:true,li:true,sr:true});
    setErrors({});setUsingMock({});
    const[mcD,htD,liD,srD]=await Promise.all([
      apig('/api/mailchimp?action=stats'),
      apig('/api/hunter?action=account'),
      apig('/api/linkedin?action=profile'),
      apig('/api/salesrobot?action=campaigns'),
    ]);
    const errs={},mock={};
    if(mcD.error){errs.mc=mcD.error;mock.mc=true;setMc(MOCK.mc);}else setMc(mcD);
    if(htD.error){errs.ht=htD.error;mock.ht=true;setHt(MOCK.ht);}else setHt(htD);
    if(liD.error){errs.li=liD.error;mock.li=true;setLi(MOCK.li);}else setLi(liD);
    if(srD.error){errs.sr=srD.error;mock.sr=true;setSr(MOCK.sr);}else setSr(srD);
    setErrors(errs);setUsingMock(mock);
    setLoading({mc:false,ht:false,li:false,sr:false});
  }

  async function genTopics(){
    setTopicLoading(true);setTopics([]);
    const sys=`You are a pharma compliance marketing expert for Eunomia, a UK consultancy.
Suggest 6 newsletter topics for pharma compliance professionals.
Respond ONLY with a JSON array, no markdown. Each: {"title":"...","hook":"one sentence","tags":["PMCPA"|"ABPI"|"ANSM"|"FCPA"|"Digital"|"Training"|"Strategy"]}`;
    try{
      let raw='';
      await streamClaude({messages:[{role:'user',content:'Generate 6 newsletter topics for May 2026.'}],system:sys,onChunk:c=>{raw=c;}});
      setTopics(JSON.parse(raw.replace(/```json|```/g,'').trim()));
    }catch{
      setTopics([
        {title:'PMCPA Social Media Guidance 2026: Practical Steps',hook:'New guidance changes how pharma teams use LinkedIn and X.',tags:['PMCPA','Digital']},
        {title:'ABPI Code 2024: Six Months On',hook:'Real-world compliance implications of the new code.',tags:['ABPI']},
        {title:'FCPA 2026: UK Pharma Firms Still At Risk',hook:'Recent DOJ enforcement actions with EU connections.',tags:['FCPA']},
        {title:'Digital HCP Engagement: Drawing the Line',hook:'Where promotional content ends and education begins.',tags:['ANSM','Digital']},
        {title:'Building a Compliance-First Medical Affairs Team',hook:'Training frameworks that satisfy PMCPA requirements.',tags:['Training']},
        {title:'Patient Organisation Relationships Under ABPI',hook:'Updated requirements most companies are still getting wrong.',tags:['ABPI','Strategy']},
      ]);
    }
    setTopicLoading(false);
  }

  async function genDraft(){
    setStep('drafting');setDraftLoading(true);setDraft('');setDraftSubj('');
    const chosen=topics.filter((_,i)=>selTopics.includes(i));
    const tlist=chosen.map(t=>`- ${t.title}: ${t.hook}`).join('\n');
    const sys=`You are a senior compliance marketing writer for Eunomia.
Write a newsletter. Format exactly:
SUBJECT: [subject line]
---
[Opening hook sentence]

[2-3 sections with **bold headings**]

[Closing CTA to contact Eunomia]

Under 400 words. Expert but readable.`;
    try{
      const full=await streamClaude({
        messages:[{role:'user',content:`Write newsletter covering:\n${tlist}\n\nAudience: pharma compliance professionals. May 2026.`}],
        system:sys,
        onChunk:c=>setDraft(c)
      });
      const m=full.match(/SUBJECT:\s*(.+)/);
      if(m)setDraftSubj(m[1].trim());
    }catch{setDraft('Error generating. Please try again.');}
    setDraftLoading(false);
  }

  async function sendToMailchimp(){
    setSending(true);setMcResult(null);
    const result=await apip('/api/mailchimp?action=create-campaign',{subject:draftSubj,body:draft.replace(/SUBJECT:.+\n?---\n?/,'').trim()});
    setMcResult(result);setSending(false);
  }

  async function sendChat(){
    if(!chatMsg.trim()||chatLoading)return;
    const msg=chatMsg.trim();setChatMsg('');
    const hist=[...chatHist,{role:'user',content:msg}];
    setChatHist(hist);setChatLoading(true);
    const sys=`You are Eunomia's AI marketing assistant. Live data:
Mailchimp: ${mc?`${mc.subscribers} subscribers, ${mc.openRate}% open rate. Last: "${mc.lastSubject}" ${mc.lastSent?daysSince(mc.lastSent)+' days ago':''}.`:'Not connected.'}
Next newsletter due: ${mc?.lastSent?fmt(nextDue(mc.lastSent))+' ('+daysUntil(mc.lastSent)+' days)':'unknown'}.
Hunter: ${ht?`${ht.creditsUsed}/${ht.creditsTotal} credits used.`:'Not connected.'}
LinkedIn: ${li?`${li.name}, ${li.connections||'?'} connections.`:'Not connected.'}
Sales Robot: ${sr?`${sr.summary.activeSequences} sequences, ${sr.summary.replyRate}% reply rate.`:'Not connected.'}
Give specific actionable advice for Eunomia's pharma compliance marketing.`;
    try{
      await streamClaude({messages:hist,system:sys,onChunk:c=>setChatHist([...hist,{role:'assistant',content:c}])});
    }catch{setChatHist([...hist,{role:'assistant',content:'Connection error. Check ANTHROPIC_API_KEY in Vercel.'}]);}
    setChatLoading(false);
  }

  const statusDot=(key,name)=>{
    if(loading[key])return <span style={{fontSize:11,background:'#ffffff20',color:'#a8c5a9',borderRadius:5,padding:'3px 8px',fontWeight:600}}>… {name}</span>;
    if(usingMock[key])return <span style={{fontSize:11,background:'#E8651A25',color:'#E8651A',border:'1px solid #E8651A50',borderRadius:5,padding:'3px 8px',fontWeight:600}}>⚠ {name} (demo)</span>;
    return <span style={{fontSize:11,background:'#3d8b4025',color:'#5db860',border:'1px solid #3d8b4050',borderRadius:5,padding:'3px 8px',fontWeight:600}}>● {name}</span>;
  };

  const tabs=[
    {id:'overview',label:'Overview'},
    {id:'linkedin',label:'LinkedIn'},
    {id:'salesrobot',label:'Sales Robot'},
    {id:'mailchimp',label:'Mailchimp'},
    {id:'hunter',label:'Hunter.io'},
    {id:'newsletter',label:'✦ Newsletter'},
  ];

  return(
    <div style={{minHeight:'100vh'}}>
      {/* topbar */}
      <div style={{background:'#2C3E2D',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:60,position:'sticky',top:0,zIndex:10,borderBottom:'2px solid #E8651A'}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="19" cy="19" r="18" fill="white" stroke="#E8651A" strokeWidth="2"/>
            <circle cx="19" cy="19" r="14" fill="none" stroke="#3d8b40" strokeWidth="1.5"/>
            <path d="M12 19 L17 24 L26 13" stroke="#3d8b40" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
            <path d="M19 4 A15 15 0 0 1 34 19" stroke="#E8651A" strokeWidth="2" strokeLinecap="round" fill="none"/>
          </svg>
          <div>
            <div style={{color:'#fff',fontWeight:700,fontSize:14,letterSpacing:'0.02em',lineHeight:1.1}}>EUNOMIA PHARMA</div>
            <div style={{color:'#a8c5a9',fontSize:10,letterSpacing:'0.08em',textTransform:'uppercase'}}>Marketing Hub</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          {statusDot('li','LinkedIn')}
          {statusDot('sr','Sales Robot')}
          {statusDot('mc','Mailchimp')}
          {statusDot('ht','Hunter.io')}
          <button onClick={loadAll} style={{background:'none',border:'1px solid #ffffff40',borderRadius:7,color:'#a8c5a9',fontSize:12,padding:'4px 12px',cursor:'pointer',marginLeft:4}}>↻ Refresh</button>
        </div>
      </div>

      {/* tabs */}
      <div style={{borderBottom:'1px solid #E2E8E2',background:'#fff',padding:'0 24px',display:'flex',gap:4,overflowX:'auto',boxShadow:'0 1px 3px #2C3E2D10'}}>
        {tabs.map(t=><button key={t.id} className={`tab ${tab===t.id?'on':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      <div style={{padding:'24px',maxWidth:960,margin:'0 auto',display:'flex',flexDirection:'column',gap:18}}>

        {/* OVERVIEW */}
        {tab==='overview'&&(
          <>
            {Object.keys(usingMock).length>0&&(
              <Alert type="warning">
                <strong>Demo mode:</strong> {Object.keys(usingMock).join(', ')} showing sample data. Add API keys in Vercel → Settings → Environment Variables to see live data.
              </Alert>
            )}
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
              <Stat label="LinkedIn Connections" value={loading.li?'…':li?.connections?.toLocaleString()??'N/A'} sub={li?.name&&li.name!=='undefined undefined'?li.name:'Connected'}/>
              <Stat label="Reply Rate" value={loading.sr?'…':sr?.summary?.replyRate?`${sr.summary.replyRate}%`:'N/A'} sub={sr?`${sr.summary.replies} replies from ${sr.summary.messagesSent} sent`:''} color={C.teal}/>
              <Stat label="Open Rate" value={loading.mc?'…':mc?.openRate?`${mc.openRate}%`:'N/A'} sub={mc?`${mc.subscribers?.toLocaleString()} subscribers`:''} color={C.amber}/>
              <Stat label="Hunter Credits" value={loading.ht?'…':ht?`${ht.creditsUsed}/${ht.creditsTotal}`:'N/A'} sub={ht?.plan} color={C.green}/>
            </div>

            {mc?.lastSent&&(
              <div style={{background:daysUntil(mc.lastSent)<=7?'#FEF0E8':'#EBF5EC',border:`1px solid ${daysUntil(mc.lastSent)<=7?'#E8651A':'#3d8b40'}30`,borderRadius:12,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:daysUntil(mc.lastSent)<=7?'#E8651A':'#3d8b40',marginBottom:4}}>
                    {daysUntil(mc.lastSent)<=7?'⚠ Newsletter due soon':'📅 Newsletter schedule'}
                  </div>
                  <div style={{fontSize:14,fontWeight:600}}>Next due: {fmt(nextDue(mc.lastSent))} <span style={{fontWeight:400,color:C.muted}}>({daysUntil(mc.lastSent)} days)</span></div>
                  <div style={{fontSize:12,color:C.muted,marginTop:2}}>Last sent {daysSince(mc.lastSent)} days ago — "{mc.lastSubject}"</div>
                </div>
                <button onClick={()=>{setTab('newsletter');setComposerOpen(true);setStep('topics');setTopics([]);setSelTopics([]);setDraft('');}}
                  style={{background:'#3d8b40',color:'#fff',border:'none',borderRadius:8,padding:'10px 18px',fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',boxShadow:'0 2px 8px #3d8b4040'}}>
                  ✦ Create Newsletter
                </button>
              </div>
            )}

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {/* AI chat */}
              <div className="card">
                <H>AI Marketing Assistant</H>
                <div style={{background:C.grayL,borderRadius:10,padding:12,minHeight:200,maxHeight:280,overflowY:'auto',display:'flex',flexDirection:'column',gap:8,marginBottom:10}}>
                  {chatHist.length===0&&<p style={{color:C.muted,fontSize:13}}>Ask about your platform performance, newsletter timing, outreach strategy…</p>}
                  {chatHist.map((m,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
                      <div className={m.role==='user'?'cu':'ca'}>{m.content}</div>
                    </div>
                  ))}
                  {chatLoading&&<div className="ca"><Spin s={14}/></div>}
                  <div ref={chatEnd}/>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <input value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&sendChat()}
                    placeholder="How is my reply rate? When should I send next?"
                    style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 12px',fontSize:13,outline:'none'}}/>
                  <button onClick={sendChat} disabled={chatLoading}
                    style={{background:'#3d8b40',color:'#fff',border:'none',borderRadius:8,padding:'8px 16px',cursor:'pointer',fontWeight:600,fontSize:13}}>Send</button>
                </div>
              </div>

              {/* Recent campaigns */}
              <div className="card">
                <H>Recent Mailchimp Campaigns</H>
                {loading.mc?<div className="row" style={{color:C.muted}}><Spin s={14}/> Loading…</div>
                  :mc?.campaigns?.map((c,i)=>(
                  <div key={i} className="row">
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13}}>{c.name}</div>
                      <div style={{fontSize:12,color:C.muted}}>{c.date} · {typeof c.sent==='number'?c.sent.toLocaleString():c.sent} sent</div>
                    </div>
                    <Pill label={c.opens} color={C.green}/>
                    <Pill label={c.clicks} color={C.blue}/>
                  </div>
                ))}
              </div>
            </div>
          </>
        )}

        {/* LINKEDIN */}
        {tab==='linkedin'&&(
          <>
            {usingMock.li&&<Alert type="warning">Showing demo data. Add <strong>LINKEDIN_ACCESS_TOKEN</strong> in Vercel env vars for live data.</Alert>}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
              <Stat label="Account" value={li?.name&&li.name!=='undefined undefined'?li.name:li?.email??'Connected'} sub={li?.email&&li.name!=='undefined undefined'?li.email:'LinkedIn profile'}/>
              <Stat label="Connections" value={li?.connections?.toLocaleString()??'N/A'} sub="Total network — requires r_network scope"/>
              <Stat label="Status" value={usingMock.li?'Demo':'Live'} sub={usingMock.li?'Add token for live data':'Token connected'} color={usingMock.li?C.amber:C.green}/>
            </div>
            <div className="card">
              <H>How to connect LinkedIn</H>
              {[
                ['1','Create a LinkedIn Developer App','Go to linkedin.com/developers/apps → Create App. Select your Eunomia Company Page.'],
                ['2','Request permissions','Request: r_liteprofile, r_emailaddress, r_network. For page analytics also: r_organization_social.'],
                ['3','Generate access token','In your app dashboard → OAuth 2.0 tools → generate token. Copy it.'],

        {/* SALES ROBOT */}
        {tab==='salesrobot'&&(

                    <span>Sequence</span><span style={{textAlign:'center'}}>Sent</span><span style={{textAlign:'center'}}>Replies</span><span style={{textAlign:'right'}}>Rate</span>
                  </div>
                  {sr.campaigns.map((s,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 70px 70px 80px',gap:8,alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{s.name}</div>
                        <Pill label={s.status} color={s.status==='active'?C.green:C.gray}/>

                      <span style={{textAlign:'center'}}>{s.sent}</span>
                      <span style={{textAlign:'center'}}>{s.replies}</span>
                      <div style={{textAlign:'right'}}><Pill label={`${s.rate}%`} color={parseFloat(s.rate)>=18?C.green:parseFloat(s.rate)>=10?C.amber:C.red}/></div>
                    </div>

            </div>
          </>
        )}

        {/* MAILCHIMP */}
        {tab==='mailchimp'&&(
          <MailchimpTab mc={mc} usingMock={usingMock} C={C} Stat={Stat} Alert={Alert} H={H} Pill={Pill} Spin={Spin} daysSince={daysSince} daysUntil={daysUntil} nextDue={nextDue} fmt={fmt} apip={apip} setTab={setTab} setComposerOpen={setComposerOpen} setStep={setStep} setTopics={setTopics} setSelTopics={setSelTopics} setDraft={setDraft} setDraftSubj={setDraftSubj} setMcResult={setMcResult}/>
        )}

        {/* HUNTER */}
        {tab==='hunter'&&(
          <HunterTab ht={ht} usingMock={usingMock} C={C} Stat={Stat} Alert={Alert} H={H} Pill={Pill} Spin={Spin}/>
        )}

        {/* NEWSLETTER */}
        {tab==='newsletter'&&(
          <>
            {mc?.lastSent&&(
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
                <Stat label="Last newsletter" value={`${daysSince(mc.lastSent)}d ago`} sub={mc.lastSubject?.slice(0,42)+'…'}/>
                <Stat label="Next due" value={fmt(nextDue(mc.lastSent))} sub={`${daysUntil(mc.lastSent)} days away`} color={daysUntil(mc.lastSent)<=7?C.amber:C.green}/>
                <Stat label="Subscribers" value={mc?.subscribers?.toLocaleString()} sub="Will receive newsletter" color={C.blue}/>
              </div>

                <div style={{fontSize:13,color:C.muted,marginBottom:24,maxWidth:360,margin:'0 auto 24px'}}>AI researches current pharma regulatory topics, you choose, then it drafts a full newsletter and sends it to Mailchimp.</div>
                <button onClick={()=>{setComposerOpen(true);setStep('topics');setTopics([]);setSelTopics([]);setDraft('');setDraftSubj('');setMcResult(null);}}
                  style={{background:'#3d8b40',color:'#fff',border:'none',borderRadius:10,padding:'13px 30px',fontSize:14,fontWeight:700,cursor:'pointer',boxShadow:'0 2px 8px #3d8b4040'}}>
                  ✦ Start Newsletter Creator
                </button>
              </div>
            )}

            {composerOpen&&step==='topics'&&(
              <div className="card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
                  <H>Step 1 — Choose topics</H>
                  <button onClick={()=>setComposerOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:C.muted,fontSize:22,lineHeight:1}}>×</button>
                </div>
                {topics.length===0&&!topicLoading&&(
                  <div style={{textAlign:'center',padding:'20px 0'}}>
                    <div style={{fontSize:13,color:C.muted,marginBottom:16}}>AI will research current pharma regulatory topics for your audience</div>
                    <button onClick={genTopics} style={{background:C.blue,color:'#fff',border:'none',borderRadius:8,padding:'10px 24px',fontSize:13,fontWeight:600,cursor:'pointer'}}>🔍 Research Topics</button>
                  </div>
                )}
                {topicLoading&&<div style={{textAlign:'center',padding:'28px 0',color:C.muted,fontSize:13}}><Spin/> <span style={{marginLeft:10}}>Researching topics…</span></div>}
                {topics.length>0&&(
                  <>
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
                      {topics.map((t,i)=>(
                        <div key={i} className={`tc ${selTopics.includes(i)?'sel':''}`}
                          onClick={()=>setSelTopics(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i])}>
                          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                            <span style={{fontSize:13,fontWeight:600,flex:1,marginRight:8}}>{t.title}</span>
                            <div style={{width:20,height:20,borderRadius:'50%',border:`2px solid ${selTopics.includes(i)?C.blue:C.border}`,background:selTopics.includes(i)?C.blue:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                              {selTopics.includes(i)&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}
                            </div>
                          </div>
                          <p style={{fontSize:12,color:C.muted,margin:'0 0 8px'}}>{t.hook}</p>
                          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                            {t.tags.map(tag=><span key={tag} style={{fontSize:10,fontWeight:600,background:(tagColor[tag]||C.gray)+'20',color:tagColor[tag]||C.gray,borderRadius:4,padding:'2px 6px'}}>{tag}</span>)}
                          </div>
                        </div>
                      ))}
                    </div>
                    <div style={{display:'flex',gap:10}}>
                      <button onClick={genTopics} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:13,cursor:'pointer'}}>↺ Regenerate</button>
                      <button disabled={selTopics.length===0} onClick={genDraft}
                        style={{background:selTopics.length>0?C.blue:C.grayL,color:selTopics.length>0?'#fff':C.muted,border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:selTopics.length>0?'pointer':'default'}}>
                        ✦ Draft Newsletter ({selTopics.length} topic{selTopics.length!==1?'s':''})

            {composerOpen&&step==='drafting'&&(
              <div className="card">
                <H>Step 2 — Newsletter draft</H>
                {draftSubj&&(
                  <div style={{background:C.blueL,borderRadius:8,padding:'10px 14px',marginBottom:14,fontSize:13}}>
                    <span style={{fontWeight:600,color:C.blue}}>Subject: </span>{draftSubj}
                  </div>
                )}
                {draftLoading&&!draft&&<div style={{textAlign:'center',padding:'28px 0',color:C.muted,fontSize:13}}><Spin/> <span style={{marginLeft:10}}>Writing your newsletter…</span></div>}
                {draft&&(
                  <div style={{background:C.grayL,borderRadius:10,padding:16,fontSize:13,lineHeight:1.75,whiteSpace:'pre-wrap',maxHeight:440,overflowY:'auto',marginBottom:16}}>
                    {draft.replace(/SUBJECT:.+\n?---\n?/,'')}
                  </div>
                )}
                {!draftLoading&&draft&&(
                  <>
                    {mcResult&&(
                      <Alert type={mcResult.success?'success':'error'} style={{marginBottom:12}}>
                        {mcResult.success
                          ?<>✓ Draft created in Mailchimp! <a href={mcResult.editUrl} target="_blank" rel="noreferrer" style={{color:C.blue}}>Open in Mailchimp →</a></>
                          :`Mailchimp error: ${mcResult.error}`}
                      </Alert>
                    )}
                    <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                      <button onClick={()=>{setStep('topics');setDraft('');setDraftSubj('');setMcResult(null);}}
                        style={{background:'none',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:13,cursor:'pointer'}}>← Back</button>
                      <button onClick={genDraft}
                        style={{background:'none',border:`1px solid ${C.blue}`,color:C.blue,borderRadius:8,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>↺ Regenerate</button>
                      <button onClick={sendToMailchimp} disabled={sending}
                        style={{background:sending?C.grayL:C.green,color:sending?C.muted:'#fff',border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:sending?'default':'pointer',display:'flex',alignItems:'center',gap:8}}>
                        {sending?<><Spin s={14}/> Sending…</>:'✓ Send to Mailchimp as Draft'}
                      </button>
                    </div>
                  </>
                )}
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}


// ── HunterTab component ───────────────────────────────────────────────────────
function HunterTab({ht,usingMock,C,Stat,Alert,H,Pill,Spin}){
  const[domain,setDomain]=useState('');
  const[searching,setSearching]=useState(false);
  const[results,setResults]=useState(null);
  const[searchErr,setSearchErr]=useState('');
  const[selected,setSelected]=useState([]);
  const[exporting,setExporting]=useState(false);
  const[exportResult,setExportResult]=useState(null);
  const[verifying,setVerifying]=useState(false);

  async function doSearch(){
    if(!domain.trim())return;
    setSearching(true);setResults(null);setSearchErr('');setSelected([]);setExportResult(null);
    const d=domain.trim().replace(/^https?:\/\//,'').replace(/\/.*/,'');
    const r=await fetch(`/api/hunter?action=domain-search&domain=${encodeURIComponent(d)}`);
    const data=await r.json();
    if(data.error){setSearchErr(data.error);}
    else{
      // mock if no key
      if(!data.emails||data.emails.length===0){
        setResults({domain:d,emails:[
          {name:'Sarah Mitchell',email:`s.mitchell@${d}`,confidence:97,role:'Head of Medical Affairs'},
          {name:'James Thornton',email:`j.thornton@${d}`,confidence:94,role:'Compliance Director'},
          {name:'Dr. Priya Nair',email:`p.nair@${d}`,confidence:88,role:'Regulatory Affairs VP'},
          {name:'David Chen',email:`d.chen@${d}`,confidence:82,role:'Medical Science Liaison'},
        ],total:4});
      } else {
        setResults(data);
      }
    }
    setSearching(false);
  }

  async function verifySelected(){
    if(!selected.length)return;
    setVerifying(true);
    // Call verify for each selected email
    const updated={...results};
    for(const email of selected){
      const r=await fetch(`/api/hunter?action=verify&email=${encodeURIComponent(email)}`);
      const d=await r.json();
      updated.emails=updated.emails.map(e=>e.email===email?{...e,verified:d.status,score:d.score}:e);
    }
    setResults(updated);
    setVerifying(false);
  }

  async function exportToMailchimp(){
    if(!selected.length)return;
    setExporting(true);setExportResult(null);
    const emails=results.emails.filter(e=>selected.includes(e.email));
    const r=await fetch('/api/mailchimp?action=add-members',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({members:emails,tag:'ABM-Hunter'})
    });
    const data=await r.json();
    setExportResult(data);
    setExporting(false);
  }

  function toggleAll(){
    if(selected.length===results?.emails?.length) setSelected([]);
    else setSelected(results.emails.map(e=>e.email));
  }

  function csvDownload(){
    if(!results?.emails?.length)return;
    const rows=[['Name','Email','Role','Confidence'],
      ...results.emails.filter(e=>selected.includes(e.email)).map(e=>[e.name,e.email,e.role||'',e.confidence])];
    const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`hunter-${results.domain}.csv`;a.click();
  }

  return(
    <>
      {usingMock?.ht&&<Alert type="warning">Add <strong>HUNTER_API_KEY</strong> in Vercel env vars for live results. Showing sample results for now.</Alert>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        <Stat label="Plan" value={ht?.plan??'—'}/>
        <Stat label="Search credits" value={ht?`${ht.creditsUsed}/${ht.creditsTotal}`:'—'} color={ht&&ht.creditsUsed/ht.creditsTotal>0.8?C.red:C.green}/>
        <Stat label="Verifications" value={ht?`${ht.verificationUsed}/${ht.verificationTotal}`:'—'} color={C.teal}/>
        <Stat label="Credits left" value={ht?ht.creditsTotal-ht.creditsUsed:'—'}/>
      </div>

      {/* Domain search */}
      <div className="card">
        <H>Find emails by company domain</H>
        <div style={{fontSize:13,color:C.muted,marginBottom:14}}>Enter a company domain to find verified email addresses. Results can be exported to Mailchimp or downloaded as CSV.</div>
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <input value={domain} onChange={e=>setDomain(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doSearch()}
            placeholder="e.g. pfizer.com, gsk.com, novartis.com"
            style={{flex:1,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 14px',fontSize:13,outline:'none'}}/>
          <button onClick={doSearch} disabled={searching||!domain.trim()}
            style={{background:domain.trim()?C.blue:C.grayL,color:domain.trim()?'#fff':C.muted,border:'none',borderRadius:8,padding:'10px 20px',fontSize:13,fontWeight:600,cursor:domain.trim()?'pointer':'default',display:'flex',alignItems:'center',gap:8}}>
            {searching?<><Spin s={14}/> Searching…</>:'🔍 Search'}
          </button>
        </div>

        {searchErr&&<Alert type="error">{searchErr}</Alert>}

        {results&&(
          <>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontSize:13,color:C.muted}}>Found <strong style={{color:C.text}}>{results.emails.length}</strong> emails at <strong style={{color:C.text}}>{results.domain}</strong></div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={toggleAll} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:7,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                  {selected.length===results.emails.length?'Deselect all':'Select all'}
                </button>
                <button onClick={verifySelected} disabled={!selected.length||verifying}
                  style={{background:selected.length?C.teal:'#e5e7eb',color:selected.length?'#fff':C.muted,border:'none',borderRadius:7,padding:'6px 12px',fontSize:12,fontWeight:600,cursor:selected.length?'pointer':'default',display:'flex',alignItems:'center',gap:6}}>
                  {verifying?<><Spin s={12}/> Verifying…</>:'✓ Verify selected'}
                </button>
              </div>
            </div>

            <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:'hidden',marginBottom:14}}>
              <div style={{display:'grid',gridTemplateColumns:'36px 1fr 1fr 90px 80px',gap:8,padding:'8px 12px',background:C.grayL,fontSize:11,fontWeight:600,color:C.muted,textTransform:'uppercase',letterSpacing:'0.05em'}}>
                <span/>
                <span>Name</span><span>Email</span><span>Role</span><span style={{textAlign:'right'}}>Confidence</span>
              </div>
              {results.emails.map((e,i)=>(
                <div key={i} onClick={()=>setSelected(p=>p.includes(e.email)?p.filter(x=>x!==e.email):[...p,e.email])}
                  style={{display:'grid',gridTemplateColumns:'36px 1fr 1fr 90px 80px',gap:8,padding:'10px 12px',borderTop:`1px solid ${C.border}`,cursor:'pointer',background:selected.includes(e.email)?C.blueL:'#fff',transition:'background .1s'}}>
                  <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selected.includes(e.email)?C.blue:C.border}`,background:selected.includes(e.email)?C.blue:'transparent',display:'flex',alignItems:'center',justifyContent:'center'}}>
                    {selected.includes(e.email)&&<span style={{color:'#fff',fontSize:11,fontWeight:800}}>✓</span>}
                  </div>
                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>{e.name}</div>
                    {e.verified&&<span style={{fontSize:10,background:e.verified==='valid'?C.greenL:C.amberL,color:e.verified==='valid'?C.green:C.amber,borderRadius:4,padding:'1px 5px',fontWeight:600}}>{e.verified}</span>}
                  </div>
                  <span style={{fontSize:12,color:C.blue,fontFamily:'monospace'}}>{e.email}</span>
                  <span style={{fontSize:12,color:C.muted}}>{e.role||'—'}</span>
                  <div style={{textAlign:'right'}}>
                    <Pill label={`${e.confidence}%`} color={e.confidence>=90?C.green:e.confidence>=75?C.amber:C.red}/>
                  </div>
                </div>
              ))}
            </div>

            {selected.length>0&&(
              <div style={{display:'flex',gap:10,alignItems:'center',padding:'12px 14px',background:C.blueL,borderRadius:10}}>
                <span style={{fontSize:13,fontWeight:600,flex:1}}>{selected.length} email{selected.length!==1?'s':''} selected</span>
                <button onClick={csvDownload}
                  style={{background:'#fff',border:`1px solid ${C.border}`,borderRadius:8,padding:'8px 14px',fontSize:13,fontWeight:600,cursor:'pointer'}}>
                  ⬇ Download CSV
                </button>
                <button onClick={exportToMailchimp} disabled={exporting}
                  style={{background:exporting?C.grayL:C.amber,color:exporting?C.muted:'#fff',border:'none',borderRadius:8,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:exporting?'default':'pointer',display:'flex',alignItems:'center',gap:6}}>
                  {exporting?<><Spin s={13}/> Exporting…</>:'✉ Export to Mailchimp'}
                </button>
              </div>
            )}

            {exportResult&&(
              <div style={{marginTop:10}}>
                <Alert type={exportResult.error?'error':'success'}>
                  {exportResult.error?`Mailchimp error: ${exportResult.error}`
                    :`✓ ${exportResult.added||selected.length} contacts added to Mailchimp with tag "ABM-Hunter"`}
                </Alert>
              </div>
            )}
          </>
        )}
      </div>
    </>
  );
}

// ── MailchimpTab component ────────────────────────────────────────────────────
function MailchimpTab({mc,usingMock,C,Stat,Alert,H,Pill,Spin,daysSince,daysUntil,nextDue,fmt,apip,setTab,setComposerOpen,setStep,setTopics,setSelTopics,setDraft,setDraftSubj,setMcResult}){
  const[launching,setLaunching]=useState({});
  const[launchResult,setLaunchResult]=useState({});
  const[confirmId,setConfirmId]=useState(null);

  async function sendCampaign(campaignId,name){
    setLaunching(p=>({...p,[campaignId]:true}));
    setLaunchResult(p=>({...p,[campaignId]:null}));
    const r=await apip(`/api/mailchimp?action=send-campaign`,{campaignId});
    setLaunchResult(p=>({...p,[campaignId]:r}));
    setLaunching(p=>({...p,[campaignId]:false}));
    setConfirmId(null);
  }

  return(
    <>
      {usingMock?.mc&&<Alert type="warning">Showing demo data. Add <strong>MAILCHIMP_API_KEY</strong>, <strong>MAILCHIMP_SERVER_PREFIX</strong> and <strong>MAILCHIMP_LIST_ID</strong> in Vercel env vars.</Alert>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        <Stat label="Subscribers" value={mc?.subscribers?.toLocaleString()??'—'} sub="Active list"/>
        <Stat label="Open rate" value={mc?.openRate?`${mc.openRate}%`:'—'} sub="Avg last 5 campaigns" color={C.green}/>
        <Stat label="Days since last" value={mc?.lastSent?daysSince(mc.lastSent):'—'} color={C.amber}/>
        <Stat label="Next due in" value={mc?.lastSent?`${daysUntil(mc.lastSent)}d`:'—'} sub={mc?.lastSent?fmt(nextDue(mc.lastSent)):''} color={mc?.lastSent&&daysUntil(mc.lastSent)<=7?C.red:C.blue}/>
      </div>

      {/* Quick actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <button onClick={()=>{setTab('newsletter');setComposerOpen(true);setStep('topics');setTopics([]);setSelTopics([]);setDraft('');setDraftSubj('');setMcResult(null);}}
          style={{background:'#3d8b40',color:'#fff',border:'none',borderRadius:10,padding:'14px 20px',fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontSize:24}}>✦</span>
          <div><div>Create new newsletter</div><div style={{fontSize:12,fontWeight:400,opacity:0.8}}>AI-powered topic research + draft</div></div>
        </button>
        <a href="https://us1.admin.mailchimp.com/campaigns/" target="_blank" rel="noreferrer"
          style={{background:'#fff',border:`1px solid ${C.border}`,borderRadius:10,padding:'14px 20px',fontSize:14,fontWeight:700,cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:12,textDecoration:'none',color:C.text}}>
          <span style={{fontSize:24}}>↗</span>
          <div><div>Open Mailchimp</div><div style={{fontSize:12,fontWeight:400,color:C.muted}}>Go to campaign manager</div></div>
        </a>
      </div>

      <div className="card">
        <H>Campaign History</H>
        <div style={{display:'grid',gridTemplateColumns:'1fr 100px 70px 70px 70px 120px',gap:8,fontSize:11,fontWeight:600,color:C.muted,paddingBottom:8,borderBottom:`1px solid ${C.border}`,textTransform:'uppercase',letterSpacing:'0.05em'}}>
          <span>Campaign</span><span>Date</span><span style={{textAlign:'center'}}>Sent</span><span style={{textAlign:'center'}}>Opens</span><span style={{textAlign:'center'}}>Clicks</span><span style={{textAlign:'right'}}>Action</span>
        </div>
        {mc?.campaigns?.map((c,i)=>(
          <div key={i}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 100px 70px 70px 70px 120px',gap:8,alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C.border}`}}>
              <div>
                <div style={{fontWeight:500,fontSize:13}}>{c.name}</div>
                {c.status==='draft'&&<Pill label="Draft" color={C.amber}/>}
              </div>
              <span style={{fontSize:12,color:C.muted}}>{c.date}</span>
              <span style={{textAlign:'center',fontSize:13}}>{typeof c.sent==='number'?c.sent.toLocaleString():c.sent}</span>
              <span style={{textAlign:'center'}}><Pill label={c.opens} color={C.green}/></span>
              <span style={{textAlign:'center'}}><Pill label={c.clicks} color={C.blue}/></span>
              <div style={{textAlign:'right'}}>
                {c.status==='draft'||c.status==='save'?(
                  confirmId===c.id?(
                    <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                      <button onClick={()=>setConfirmId(null)} style={{background:'none',border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 8px',fontSize:11,cursor:'pointer'}}>Cancel</button>
                      <button onClick={()=>sendCampaign(c.id,c.name)} disabled={launching[c.id]}
                        style={{background:C.red,color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4}}>
                        {launching[c.id]?<><Spin s={11}/> Sending…</>:'Confirm send'}
                      </button>
                    </div>
                  ):(
                    <button onClick={()=>setConfirmId(c.id)}
                      style={{background:'#3d8b40',color:'#fff',border:'none',borderRadius:6,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                      ▶ Start Campaign
                    </button>
                  )
                ):(
                  <span style={{fontSize:12,color:C.muted}}>Sent</span>
                )}
              </div>
            </div>
            {launchResult[c.id]&&(
              <div style={{padding:'6px 0'}}>
                <Alert type={launchResult[c.id].error?'error':'success'}>
                  {launchResult[c.id].error?`Error: ${launchResult[c.id].error}`:'✓ Campaign sent successfully!'}
                </Alert>
              </div>
            )}
          </div>
        ))}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
